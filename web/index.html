<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeRails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      :root {
        --bg: #f5f6fa;
        --sidebar: #202638;
        --header: #1a1f2e;
        --panel: #ffffff;
        --panel-soft: #f8faff;
        --border: #d8e1f0;
        --text: #172033;
        --muted: #63708a;
        --primary: #4f7cff;
        --primary-dark: #3d67df;
        --danger: #e14c4c;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      [x-cloak] {
        display: none !important;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .top-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 24px;
        padding: 0 20px;
        background: var(--header);
        color: white;
      }

      .logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #4f7cff;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .viewer {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #cbd5e1;
      }

      .viewer select {
        min-width: 220px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 7px 10px;
        background: #252c3f;
        color: white;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: 100vh;
        padding-top: 56px;
      }

      .sidebar {
        position: sticky;
        top: 56px;
        height: calc(100vh - 56px);
        background: var(--sidebar);
        color: #f0f4ff;
        padding: 24px 16px;
      }

      .nav-list {
        display: grid;
        gap: 10px;
      }

      .nav-button {
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        position: relative;
        padding: 8px 14px 8px 18px;
        border-radius: 8px;
        text-align: left;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .nav-button:hover {
        background: #252c3f;
      }

      .nav-button.active,
      .nav-button.active:hover {
        background: #2a3148;
      }

      .nav-button.active::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: #4f7cff;
      }

      .content {
        min-width: 0;
        padding: 28px;
      }

      .page-header {
        margin-bottom: 20px;
      }

      .page-header h1 {
        margin: 0 0 8px;
        color: #1a1f2e;
        font-size: 28px;
        font-weight: 800;
      }

      .page-header p {
        margin: 0;
        color: var(--muted);
      }

      .status-banner {
        margin-bottom: 18px;
        padding: 12px 14px;
        border-radius: 8px;
        background: #fff6db;
        color: #6c5311;
      }

      .error-banner {
        background: #ffe3e3;
        color: #8a2121;
      }

      .grid {
        display: grid;
        gap: 32px;
      }

      .overview-layout {
        display: grid;
        grid-template-columns: minmax(240px, 30%) minmax(0, 70%);
        gap: 20px;
      }

      .contracts-layout {
        display: grid;
        grid-template-columns: minmax(240px, 30%) minmax(0, 70%);
        gap: 20px;
      }

      .features-layout {
        display: grid;
        grid-template-columns: minmax(280px, 35%) minmax(0, 65%);
        gap: 32px;
      }

      .split-layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 32px;
      }

      .cards-2 {
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .panel {
        background: var(--panel);
        border: 1px solid #e8eaf0;
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .panel.soft {
        background: var(--panel-soft);
      }

      .panel h2,
      .panel h3,
      .panel h4 {
        margin-top: 0;
      }

      .section-title {
        display: block;
        margin: 0 0 20px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        color: #666;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: none;
      }

      .section-title::after {
        content: none;
      }

      .card-section + .card-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #f0f2f7;
      }

      .member-card {
        padding: 16px;
      }

      .member-card .grid {
        gap: 12px;
      }

      .member-card .section-title {
        margin-bottom: 8px;
      }

      .member-card .card-section + .card-section {
        margin-top: 12px;
        padding-top: 12px;
      }

      .member-list-panel,
      .member-detail-panel {
        padding: 16px;
      }

      .member-list {
        display: grid;
        gap: 8px;
      }

      .member-list-item {
        position: relative;
        display: grid;
        grid-template-columns: 36px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px 8px 16px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .member-list-item:hover {
        background: #f7f9ff;
      }

      .member-list-item.selected {
        background: #f0f4ff;
      }

      .member-list-item.selected::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: #4f7cff;
      }

      .contract-list-item {
        position: relative;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px 10px 18px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
        font-weight: 700;
      }

      .contract-list-item:hover {
        background: #f7f9ff;
      }

      .contract-list-item.selected {
        background: #f0f4ff;
      }

      .contract-list-item.selected::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: #4f7cff;
      }

      .avatar {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: #eaf0ff;
        color: #4f7cff;
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .member-list-name {
        overflow: hidden;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .member-detail-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .member-detail-header h2 {
        margin: 0 0 6px;
        color: #1a1f2e;
        font-size: 24px;
      }

      .team-settings {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #f0f2f7;
      }

      .team-settings-body {
        display: grid;
        gap: 20px;
        margin-top: 16px;
      }

      .contracts-section {
        margin-top: 28px;
        padding-top: 28px;
        border-top: 2px solid #dbe3f3;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .list {
        display: grid;
        gap: 12px;
      }

      .list-item {
        border: 1px solid #e8eaf0;
        border-radius: 8px;
        padding: 14px;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .list-item.selected {
        border-color: var(--primary);
        box-shadow: inset 0 0 0 1px var(--primary);
      }

      .actions,
      .inline-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef3ff;
        color: var(--primary-dark);
        font-size: 13px;
      }

      .badge,
      .status-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .badge {
        background: #e7eeff;
        color: var(--primary-dark);
      }

      .status-badge {
        text-transform: uppercase;
      }

      .status-stable {
        background: #dcfce7;
        color: #166534;
      }

      .status-in_progress {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .status-planned {
        background: #ffedd5;
        color: #c2410c;
      }

      .status-deprecated {
        background: #e5e7eb;
        color: #4b5563;
      }

      .btn,
      .btn-secondary,
      .btn-danger {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .btn {
        background: var(--primary);
        color: white;
      }

      .btn:hover {
        background: var(--primary-dark);
      }

      .btn-secondary {
        background: #eaf0ff;
        color: var(--primary-dark);
      }

      .btn-danger {
        background: #ffe4e4;
        color: var(--danger);
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: white;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .empty-state {
        padding: 16px;
        border-radius: 8px;
        background: #f3f6fb;
        color: var(--muted);
      }

      .standard-preview,
      .comment-body {
        white-space: pre-wrap;
        color: var(--muted);
      }

      .interface-signature {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
      }

      .feature-card {
        cursor: pointer;
      }

      .feature-detail-header {
        display: grid;
        gap: 10px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.48);
        z-index: 30;
      }

      .modal {
        width: min(560px, 100%);
        background: var(--panel);
        border-radius: 8px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
        padding: 22px;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .modal-header h3 {
        margin: 0;
      }

      @media (max-width: 1000px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
        }

        .overview-layout,
        .contracts-layout,
        .features-layout,
        .split-layout {
          grid-template-columns: 1fr;
        }

        .top-header {
          align-items: center;
          height: 56px;
          padding: 10px 16px;
        }

        .app-shell {
          padding-top: 56px;
        }
      }
    </style>
  </head>
  <body>
    <div x-data="vibeRailsApp()" x-init="init()">
      <header class="top-header">
        <div class="logo">VibeRails</div>
        <label class="viewer">
          Viewing as
          <select x-model="currentMemberId" @change="setCurrentMember()">
            <option value="">Select member</option>
            <template x-for="member in members" :key="member.member_id">
              <option :value="String(member.member_id)" x-text="`${member.name} (${member.role})`"></option>
            </template>
          </select>
        </label>
      </header>

      <div class="app-shell">
        <aside class="sidebar">
          <nav class="nav-list">
            <button class="nav-button" :class="{ active: currentPage === 'overview' }" @click="currentPage = 'overview'">Overview</button>
            <button class="nav-button" :class="{ active: currentPage === 'contracts' }" @click="currentPage = 'contracts'">Contracts</button>
            <button class="nav-button" :class="{ active: currentPage === 'features' }" @click="currentPage = 'features'">Interfaces & Features</button>
          </nav>
        </aside>

        <main class="content">
          <div class="page-header">
            <h1 x-text="pageTitles[currentPage]"></h1>
          </div>

          <div class="status-banner" x-show="loading">Loading data from API...</div>
          <div class="status-banner error-banner" x-show="error" x-text="error"></div>

          <section x-show="currentPage === 'overview'" class="overview-layout">
            <aside class="panel member-list-panel">
              <h3 class="section-title">Member List</h3>
              <template x-if="members.length === 0">
                <div class="empty-state">No members yet.</div>
              </template>

              <div class="member-list">
                <template x-for="member in members" :key="member.member_id">
                  <button
                    class="member-list-item"
                    :class="{ selected: selectedOverviewMemberId === member.member_id }"
                    @click="selectOverviewMember(member.member_id)"
                  >
                    <span class="avatar" x-text="memberInitial(member)"></span>
                    <span class="member-list-name" x-text="member.name"></span>
                    <span class="badge" x-text="member.role"></span>
                  </button>
                </template>
              </div>
            </aside>

            <section class="panel member-detail-panel">
              <template x-if="!selectedOverviewMember">
                <div class="empty-state">Select a member to view details.</div>
              </template>

              <template x-if="selectedOverviewMember">
                <div>
                  <div class="member-detail-header">
                    <div>
                      <h2 x-text="selectedOverviewMember.name"></h2>
                    </div>
                    <span class="badge" x-text="selectedOverviewMember.role"></span>
                  </div>

                  <div class="grid" style="margin-top: 16px">
                    <div class="card-section">
                      <h4 class="section-title">Owned Modules</h4>
                      <div class="chip-list" x-show="selectedOverviewMember.patterns.length > 0">
                        <template x-for="pattern in selectedOverviewMember.patterns" :key="pattern">
                          <span class="chip" x-text="pattern"></span>
                        </template>
                      </div>
                      <p class="muted" x-show="selectedOverviewMember.patterns.length === 0">No scope patterns defined yet.</p>
                    </div>

                    <div class="card-section">
                      <h4 class="section-title">Goal</h4>
                      <div class="standard-preview" x-text="selectedOverviewMember.goal || 'No goal defined yet.'"></div>
                    </div>
                  </div>

                  <div class="team-settings">
                    <button class="btn-secondary" @click="teamSettingsOpen = !teamSettingsOpen">
                      <span x-text="teamSettingsOpen ? 'Hide Team Settings' : 'Show Team Settings'"></span>
                    </button>

                    <div class="team-settings-body" x-show="teamSettingsOpen">
                      <div class="panel soft">
                        <h3 class="section-title">Add Member</h3>
                        <form class="form-grid" @submit.prevent="createMember()">
                          <label>
                            Name
                            <input type="text" x-model="newMember.name" placeholder="e.g. Alice" />
                          </label>
                          <label>
                            Role
                            <select x-model="newMember.role">
                              <option value="" disabled>Select role</option>
                              <option value="member">member</option>
                              <option value="owner">owner</option>
                            </select>
                          </label>
                          <button class="btn" type="submit">Add Member</button>
                        </form>
                      </div>

                      <div class="panel soft">
                        <h3 class="section-title">Member Management</h3>
                        <div class="list">
                          <template x-for="member in members" :key="member.member_id">
                            <div class="list-item">
                              <div class="row">
                                <div>
                                  <strong x-text="member.name"></strong>
                                  <div class="muted" x-text="member.role"></div>
                                </div>
                                <div class="actions">
                                  <button class="btn-secondary" @click="toggleMemberEditor(member.member_id)">
                                    <span x-text="expandedMemberId === member.member_id ? 'Collapse Scope' : 'Edit Scope'"></span>
                                  </button>
                                  <button class="btn-danger" @click="deleteMember(member.member_id)">Remove</button>
                                </div>
                              </div>

                              <div x-show="expandedMemberId === member.member_id" style="margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border)">
                                <div class="inline-list" x-show="member.patterns.length > 0">
                                  <template x-for="pattern in member.patterns" :key="pattern">
                                    <span class="chip">
                                      <span x-text="pattern"></span>
                                      <button type="button" style="margin-left: 8px; border: 0; background: transparent; color: inherit; cursor: pointer;" @click="removePattern(member.member_id, pattern)">x</button>
                                    </span>
                                  </template>
                                </div>
                                <p class="muted" x-show="member.patterns.length === 0">No patterns yet.</p>

                                <form class="form-row" style="margin-top: 12px" @submit.prevent="addPattern(member.member_id)">
                                  <label>
                                    New Pattern
                                    <input type="text" x-model="patternDrafts[member.member_id]" placeholder="src/auth/**" />
                                  </label>
                                  <div class="actions" style="align-items: end">
                                    <button class="btn" type="submit">Add Pattern</button>
                                  </div>
                                </form>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>

                    </div>
                  </div>
                </div>
              </template>
            </section>
          </section>

          <section x-show="currentPage === 'contracts'" class="contracts-layout">
            <aside class="panel">
              <h3 class="section-title">Contracts</h3>
              <div class="member-list">
                <button class="contract-list-item" :class="{ selected: selectedContractSection === 'global' }" @click="selectedContractSection = 'global'">Global Standards</button>
                <button class="contract-list-item" :class="{ selected: selectedContractSection === 'personal' }" @click="selectedContractSection = 'personal'">Personal Standards</button>
                <button class="contract-list-item" :class="{ selected: selectedContractSection === 'locked' }" @click="selectedContractSection = 'locked'">Locked Modules</button>
              </div>
            </aside>

            <section class="panel">
              <div x-show="selectedContractSection === 'global'" class="grid">
                <div>
                  <h3 class="section-title">Global Standards</h3>
                  <div class="list">
                    <template x-if="globalStandards.length === 0">
                      <div class="empty-state">No global standards defined yet.</div>
                    </template>
                    <template x-for="standard in globalStandards" :key="standard.category">
                      <div class="list-item" :class="{ selected: globalEditor.originalCategory === standard.category && globalEditor.mode === 'edit' }">
                        <div class="row">
                          <div>
                            <strong x-text="standard.category"></strong>
                            <div class="muted" x-text="formatUpdatedAt(standard.updated_at)"></div>
                          </div>
                          <div class="actions">
                            <button class="btn-secondary" @click="editGlobalStandard(standard)">Edit</button>
                            <button class="btn-danger" @click="deleteGlobalStandard(standard.category)">Remove</button>
                          </div>
                        </div>
                        <div class="standard-preview" style="margin-top: 10px" x-html="marked.parse(standard.content)"></div>
                      </div>
                    </template>
                  </div>
                </div>

                <form class="form-grid card-section" @submit.prevent="saveGlobalStandard()">
                  <h3 class="section-title" x-text="globalEditor.mode === 'create' ? 'Add Standard' : 'Edit Standard'"></h3>
                  <label>
                    Category
                    <input type="text" x-model="globalEditor.category" :disabled="globalEditor.mode === 'edit'" placeholder="e.g. naming" />
                  </label>
                  <label>
                    Content
                    <textarea x-model="globalEditor.content" placeholder="Write in Markdown..."></textarea>
                  </label>
                  <div class="actions">
                    <button class="btn" type="submit">Save</button>
                    <button class="btn-secondary" type="button" @click="resetGlobalEditor()">Clear</button>
                  </div>
                </form>
              </div>

              <div x-show="selectedContractSection === 'personal'" class="grid">
                <h3 class="section-title">Personal Standards</h3>
                <div class="grid cards-2">
                  <template x-for="member in members" :key="member.member_id">
                    <section class="panel soft">
                      <div class="row">
                        <div>
                          <strong x-text="member.name"></strong>
                          <div class="muted" x-text="member.role"></div>
                        </div>
                      </div>

                      <div class="list" style="margin-top: 14px">
                        <template x-if="member.personalStandards.length === 0">
                          <div class="empty-state">No personal standards defined yet.</div>
                        </template>
                        <template x-for="standard in member.personalStandards" :key="member.member_id + '-' + standard.category">
                          <div class="list-item">
                            <div class="row">
                              <div>
                                <strong x-text="standard.category"></strong>
                                <div class="muted" x-text="formatUpdatedAt(standard.updated_at)"></div>
                              </div>
                              <div class="actions" x-show="isCurrentUserOwner">
                                <button class="btn-secondary" @click="editPersonalStandard(member.member_id, standard)">Edit</button>
                                <button class="btn-danger" @click="deletePersonalStandard(member.member_id, standard.category)">Remove</button>
                              </div>
                            </div>
                            <div class="standard-preview" style="margin-top: 10px" x-html="marked.parse(standard.content)"></div>
                          </div>
                        </template>
                      </div>

                      <form class="form-grid" x-show="isCurrentUserOwner" style="margin-top: 14px" @submit.prevent="savePersonalStandard(member.member_id)">
                        <label>
                          Category
                          <input type="text" x-model="personalEditors[member.member_id].category" :disabled="personalEditors[member.member_id].mode === 'edit'" placeholder="goal" />
                        </label>

                          Content
                          <textarea x-model="personalEditors[member.member_id].content" placeholder="## Weekly Goal&#10;Finish the member permission flow."></textarea>
                        </label>

                          <button class="btn" type="submit">Save</button>
                          <button class="btn-secondary" type="button" @click="resetPersonalEditor(member.member_id)">Clear</button>
                        </div>
                      </form>
                    </section>

              <div x-show="selectedContractSection === 'locked'" class="grid">
                <div>
                  <h3 class="section-title">Locked Modules</h3>
                  <div class="list">
                    <template x-if="lockedModules.length === 0">
                      <div class="empty-state">No locked modules defined.</div>

                    <template x-for="item in lockedModules" :key="item.pattern">
                      <div class="list-item">

                <form class="form-grid card-section" @submit.prevent="createLockedModule()">

          <section x-show="currentPage === 'features'" class="features-layout">
            <aside class="panel">

                    </div>
                    <div x-show="selectedFeatureId === feature.id" style="margin-top: 12px">
                      <div class="muted">Interfaces</div>
                      <div class="list" style="margin-top: 8px">
                        <template x-for="item in featureInterfaces(feature)" :key="item.id">
                          <div class="interface-signature" x-text="item.signature"></div>
                        </template>
                        <div class="muted" x-show="featureInterfaces(feature).length === 0">No interfaces linked.</div>
                      </div>

                      <div class="list" style="margin-top: 8px">
                        <template x-if="feature.comments.length === 0">
                          <div class="muted">No comments yet. Start the discussion.</div>
                        </template>
                        <template x-for="comment in feature.comments.slice(0, 2)" :key="comment.id">
                          <div class="muted" x-text="`${comment.author}: ${comment.content}`"></div>

                      </div>
                    </div>
                  </div>
                </template>

              <div style="margin-top: 22px">
                <h3 class="section-title">Unassigned Interfaces</h3>
                <div class="list">
                  <template x-if="unassignedInterfaces().length === 0">
                    <div class="empty-state">No unassigned interfaces.</div>
                  </template>
                  <template x-for="item in unassignedInterfaces()" :key="item.id">

                      <div class="interface-signature" x-text="item.signature"></div>

            <section class="panel">

              <template x-if="selectedFeature">
                <div class="grid">

                    </div>

                  <form class="form-grid card-section" x-show="isCurrentUserOwner" @submit.prevent="saveFeatureDetails()">
                    <label>
                      Feature Name
                      <input type="text" x-model="selectedFeatureDraft.name" />

                    <label>

                    </label>
                    <div class="form-row">
                      <label>
                        Status
                        <select x-model="selectedFeatureDraft.status">
                          <option value="planned">planned</option>
                          <option value="in_progress">in_progress</option>
                          <option value="stable">stable</option>
                          <option value="deprecated">deprecated</option>

                      <label>
                        Owner
                        <select x-model="selectedFeatureDraft.owner_id">

                          <template x-for="member in members" :key="member.member_id">

                    <button class="btn" type="submit">Save Feature</button>
                  </form>

                  <div class="card-section">
                    <div class="row">
                      <h3 class="section-title">Linked Interfaces</h3>
                      <label x-show="isCurrentUserOwner" style="min-width: 280px">
                        Link Interface
                        <select x-model="interfaceLinkDraft" @change="linkInterfaceToSelectedFeature()">
                          <option value="">Select interface</option>
                          <template x-for="item in interfaces" :key="item.id">
                            <option :value="String(item.id)" x-text="`${item.file_path} - ${item.signature}`"></option>
                          </template>
                        </select>
                      </label>
                    </div>
                    <div class="list">
                      <template x-if="featureInterfaces(selectedFeature).length === 0">
                        <div class="empty-state">No interfaces linked.</div>
                      </template>
                      <template x-for="item in featureInterfaces(selectedFeature)" :key="item.id">
                        <div class="list-item">
                          <div class="row">
                            <div>
                              <div class="interface-signature" x-text="item.signature"></div>
                              <div class="muted" x-text="item.file_path"></div>
                            </div>
                            <button class="btn-danger" x-show="isCurrentUserOwner" @click="unlinkInterfaceFromSelectedFeature(item.id)">Unlink</button>
                          </div>

                      </template>
                    </div>
                  </div>

                  <div class="card-section">
                    <h3 class="section-title">Discussion</h3>
                    <div class="list">
                      <template x-if="selectedFeature.comments.length === 0">
                        <div class="empty-state">No comments yet. Start the discussion.</div>
                      </template>
                      <template x-for="comment in selectedFeature.comments" :key="comment.id">
                        <div class="list-item">
                          <div class="row">
                            <strong x-text="comment.author"></strong>
                            <span class="muted" x-text="comment.created_at"></span>
                          </div>
                          <div class="comment-body" style="margin-top: 8px" x-text="comment.content"></div>
                        </div>
                      </template>
                    </div>
                    <form class="form-grid" style="margin-top: 14px" @submit.prevent="addCommentToSelectedFeature()">
                      <label>
                        Comment

                      </label>
                      <button class="btn" type="submit">Add Comment</button>
                    </form>
                  </div>
                </div>
              </template>

          </section>

      <div class="modal-backdrop" x-show="featureModal.open" x-cloak>
        <div class="modal">
          <div class="modal-header">
            <h3>Add Feature</h3>

          <form class="form-grid" @submit.prevent="createFeature()">
            <label>
              Feature Name
              <input type="text" x-model="featureModal.name" placeholder="Authentication Refresh" />
            </label>
            <label>
              Description
              <textarea x-model="featureModal.description" placeholder="Describe the feature goal and scope."></textarea>
            </label>
            <div class="form-row">
              <label>
                Status
                <select x-model="featureModal.status">
                  <option value="planned">planned</option>
                  <option value="in_progress">in_progress</option>
                  <option value="stable">stable</option>
                  <option value="deprecated">deprecated</option>
                </select>
              </label>
              <label>
                Owner
                <select x-model="featureModal.owner_id">
                  <option value="">Unassigned</option>
                  <template x-for="member in members" :key="member.member_id">
                    <option :value="String(member.member_id)" x-text="member.name"></option>
                  </template>

      <div class="modal-backdrop" x-show="interfaceEditor.open" x-cloak>
        <div class="modal">

            <h3>Edit Interface</h3>

          </div>
          <form class="form-grid" @submit.prevent="saveInterfaceEdit()">
            <label>
              Status
              <select x-model="interfaceEditor.status">
                <option value="stable">stable</option>
                <option value="in_progress">in_progress</option>
                <option value="planned">planned</option>
                <option value="deprecated">deprecated</option>
              </select>
            </label>
            <label>
              Owner
              <select x-model="interfaceEditor.owner_id">
                <option value="">No owner</option>
                <template x-for="member in members" :key="member.member_id">
                  <option :value="String(member.member_id)" x-text="member.name"></option>
                </template>
              </select>
            </label>
            <label>
              Description
              <textarea x-model="interfaceEditor.description" placeholder="Describe what this interface does."></textarea>
            </label>
            <div class="actions">
              <button class="btn" type="submit">Save</button>
              <button class="btn-secondary" type="button" @click="closeInterfaceEditor()">Cancel</button>
            </div>
          </form>

      <div class="modal-backdrop" x-show="plannedInterfaceModal.open" x-cloak>
        <div class="modal">
          <div class="modal-header">
            <h3>Add Planned Interface</h3>
            <button class="btn-secondary" @click="closePlannedInterfaceModal()">Close</button>
          </div>
          <form class="form-grid" @submit.prevent="createPlannedInterface()">
            <label>
              File Path
              <input type="text" x-model="plannedInterfaceModal.file_path" placeholder="src/auth/api.py" />
            </label>
            <label>
              Signature
              <input type="text" x-model="plannedInterfaceModal.signature" placeholder="create_token(user_id: int) -> str" />
            </label>
            <label>
              Description
              <textarea x-model="plannedInterfaceModal.description" placeholder="Describe the planned interface."></textarea>
            </label>
            <label>
              Owner
              <select x-model="plannedInterfaceModal.owner_id">
                <option value="">No owner</option>
                <template x-for="member in members" :key="member.member_id">
                  <option :value="String(member.member_id)" x-text="member.name"></option>
                </template>
              </select>
            </label>
            <div class="actions">
              <button class="btn" type="submit">Create</button>
              <button class="btn-secondary" type="button" @click="closePlannedInterfaceModal()">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      function vibeRailsApp() {
        const baseUrl = "http://localhost:8000";
        const featureStorageKey = "vibrails.features.v1";

        return {
          baseUrl,
          currentPage: "overview",
          loading: false,
          error: "",
          expandedMemberId: null,
          selectedOverviewMemberId: null,
          selectedContractSection: "global",
          teamSettingsOpen: false,
          currentMember: null,
          currentMemberId: "",
          members: [],
          interfaces: [],
          lockedModules: [],
          globalStandards: [],
          features: [],
          selectedFeatureId: null,
          selectedFeatureDraft: {},
          interfaceLinkDraft: "",
          commentDraft: "",
          newMember: { name: "", role: "" },
          newLocked: { pattern: "", reason: "" },
          patternDrafts: {},
          globalEditor: { mode: "create", category: "", content: "", originalCategory: "" },
          interfaceEditor: {
            open: false,
            id: null,
            status: "stable",
            owner_id: "",
            description: "",
          },
          plannedInterfaceModal: {
            open: false,
            file_path: "",
            signature: "",
            description: "",
            owner_id: "",
          },
          featureModal: {
            open: false,
            name: "",
            description: "",
            status: "planned",
            owner_id: "",
          },
          personalEditors: {},
          pageTitles: {
            overview: "Overview",
            contracts: "Contracts",
            features: "Interfaces & Features",
          },

          get isCurrentUserOwner() {
            return this.currentMember?.role === "owner";
          },

          get selectedFeature() {
            return this.features.find((feature) => feature.id === this.selectedFeatureId) || null;
          },

          get selectedOverviewMember() {
            return (
              this.members.find(
                (member) => member.member_id === this.selectedOverviewMemberId
              ) || null
            );
          },

          async init() {
            this.loadFeatures();
            await this.refreshAll();
          },

          async api(path, options = {}) {
            const response = await fetch(`${this.baseUrl}${path}`, {
              headers: { "Content-Type": "application/json", ...(options.headers || {}) },
              ...options,
            });

            let payload = null;
            const text = await response.text();
            if (text) {
              try {
                payload = JSON.parse(text);
              } catch (error) {
                payload = text;
              }
            }

            if (!response.ok) {
              const detail =
                payload && typeof payload === "object" && payload.detail
                  ? payload.detail
                  : `Request failed: ${response.status}`;
              throw new Error(detail);
            }

            return payload;
          },

          async refreshAll() {
            this.loading = true;
            this.error = "";

            try {
              const [members, lockedModules, globalStandards, interfaces] = await Promise.all([
                this.api("/members/"),
                this.api("/contracts/locked"),
                this.api("/contracts/standards/global"),
                this.api("/contracts/interfaces"),
              ]);

              const enrichedMembers = await Promise.all(
                members.map(async (member) => {
                  const [scope, personalStandards] = await Promise.all([
                    this.fetchScope(member.member_id),
                    this.fetchStandards(String(member.member_id)),
                  ]);

                  const goalStandard = personalStandards.find(
                    (standard) => standard.category === "goal"
                  );

                  return {
                    ...member,
                    patterns: scope.patterns,
                    personalStandards,
                    goal: goalStandard ? goalStandard.content : "",
                  };
                })
              );

              this.members = enrichedMembers;
              this.interfaces = interfaces;
              this.lockedModules = lockedModules;
              this.globalStandards = globalStandards;
              this.syncEditors();
              this.ensureOverviewSelection();
              this.setCurrentMember();
            } catch (error) {
              this.error = error.message || "Failed to load data.";
            } finally {
              this.loading = false;
            }
          },

          async fetchScope(memberId) {
            try {
              return await this.api(`/contracts/scopes/${memberId}`);
            } catch (error) {
              if (String(error.message).includes("scope not found")) {
                return { member_id: memberId, patterns: [] };
              }
              throw error;
            }
          },

          async fetchStandards(scope) {
            return this.api(`/contracts/standards/${scope}`);
          },

          setCurrentMember() {
            if (!this.currentMemberId) {
              this.currentMember = null;
              return;
            }

            this.currentMember =
              this.members.find(
                (member) => String(member.member_id) === String(this.currentMemberId)
              ) || null;
          },

          syncEditors() {
            const nextDrafts = {};
            const nextEditors = {};

            this.members.forEach((member) => {
              nextDrafts[member.member_id] = this.patternDrafts[member.member_id] || "";
              nextEditors[member.member_id] =
                this.personalEditors[member.member_id] || {
                  mode: "create",
                  category: "",
                  content: "",
                  originalCategory: "",
                };
            });

            this.patternDrafts = nextDrafts;
            this.personalEditors = nextEditors;
          },

          ensureOverviewSelection() {
            if (this.members.length === 0) {
              this.selectedOverviewMemberId = null;
              return;
            }

            const selectedStillExists = this.members.some(
              (member) => member.member_id === this.selectedOverviewMemberId
            );
            if (!selectedStillExists) {
              this.selectedOverviewMemberId = this.members[0].member_id;
            }
          },

          selectOverviewMember(memberId) {
            this.selectedOverviewMemberId = memberId;
          },

          memberInitial(member) {
            return (member?.name || "?").trim().charAt(0) || "?";
          },

          toggleMemberEditor(memberId) {
            this.expandedMemberId = this.expandedMemberId === memberId ? null : memberId;
          },

          resetGlobalEditor() {
            this.globalEditor = { mode: "create", category: "", content: "", originalCategory: "" };
          },

          startGlobalCreate() {
            this.resetGlobalEditor();
          },

          editGlobalStandard(standard) {
            this.globalEditor = {
              mode: "edit",
              category: standard.category,
              content: standard.content,
              originalCategory: standard.category,
            };
          },

          resetPersonalEditor(memberId) {
            this.personalEditors[memberId] = {
              mode: "create",
              category: "",
              content: "",
              originalCategory: "",
            };
          },

          editPersonalStandard(memberId, standard) {
            this.personalEditors[memberId] = {
              mode: "edit",
              category: standard.category,
              content: standard.content,
              originalCategory: standard.category,
            };
          },

          async createMember() {
            await this.api("/members/", {
              method: "POST",
              body: JSON.stringify(this.newMember),
            });
            this.newMember = { name: "", role: "" };
            await this.refreshAll();
          },

          async deleteMember(memberId) {
            await this.api(`/members/${memberId}`, { method: "DELETE" });
            if (this.expandedMemberId === memberId) {
              this.expandedMemberId = null;
            }
            if (String(this.currentMemberId) === String(memberId)) {
              this.currentMemberId = "";
              this.currentMember = null;
            }
            if (this.selectedOverviewMemberId === memberId) {
              this.selectedOverviewMemberId = null;
            }
            await this.refreshAll();
          },

          async addPattern(memberId) {
            const draft = (this.patternDrafts[memberId] || "").trim();
            if (!draft) {
              return;
            }

            const member = this.members.find((item) => item.member_id === memberId);
            const patterns = member ? [...member.patterns] : [];
            if (!patterns.includes(draft)) {
              patterns.push(draft);
            }

            await this.api(`/contracts/scopes/${memberId}`, {
              method: "PUT",
              body: JSON.stringify({ patterns }),
            });
            this.patternDrafts[memberId] = "";
            await this.refreshAll();
          },

          async removePattern(memberId, pattern) {
            const member = this.members.find((item) => item.member_id === memberId);
            if (!member) {
              return;
            }

            const patterns = member.patterns.filter((item) => item !== pattern);
            if (patterns.length === 0) {
              try {
                await this.api(`/contracts/scopes/${memberId}`, { method: "DELETE" });
              } catch (error) {
                if (!String(error.message).includes("scope not found")) {
                  throw error;
                }
              }
            } else {
              await this.api(`/contracts/scopes/${memberId}`, {
                method: "PUT",
                body: JSON.stringify({ patterns }),
              });
            }

            await this.refreshAll();
          },

          async saveGlobalStandard() {
            const editor = this.globalEditor;
            if (!editor.category.trim() || !editor.content.trim()) {
              return;
            }

            if (editor.mode === "create") {
              await this.api("/contracts/standards", {
                method: "POST",
                body: JSON.stringify({
                  scope: "global",
                  category: editor.category.trim(),
                  content: editor.content,
                }),
              });
            } else {
              await this.api(`/contracts/standards/global/${encodeURIComponent(editor.originalCategory)}`, {
                method: "PATCH",
                body: JSON.stringify({ content: editor.content }),
              });
            }

            this.resetGlobalEditor();
            await this.refreshAll();
          },

          async deleteGlobalStandard(category) {
            await this.api(`/contracts/standards/global/${encodeURIComponent(category)}`, {
              method: "DELETE",
            });
            if (this.globalEditor.originalCategory === category) {
              this.resetGlobalEditor();
            }
            await this.refreshAll();
          },

          async savePersonalStandard(memberId) {
            const editor = this.personalEditors[memberId];
            if (!editor.category.trim() || !editor.content.trim()) {
              return;
            }

            if (editor.mode === "create") {
              await this.api("/contracts/standards", {
                method: "POST",
                body: JSON.stringify({
                  scope: String(memberId),
                  category: editor.category.trim(),
                  content: editor.content,
                }),
              });
            } else {
              await this.api(
                `/contracts/standards/${memberId}/${encodeURIComponent(editor.originalCategory)}`,
                {
                  method: "PATCH",
                  body: JSON.stringify({ content: editor.content }),
                }
              );
            }

            this.resetPersonalEditor(memberId);
            await this.refreshAll();
          },

          async deletePersonalStandard(memberId, category) {
            await this.api(`/contracts/standards/${memberId}/${encodeURIComponent(category)}`, {
              method: "DELETE",
            });
            if (this.personalEditors[memberId]?.originalCategory === category) {
              this.resetPersonalEditor(memberId);
            }
            await this.refreshAll();
          },

          async createLockedModule() {
            await this.api("/contracts/locked", {
              method: "POST",
              body: JSON.stringify(this.newLocked),
            });
            this.newLocked = { pattern: "", reason: "" };
            await this.refreshAll();
          },

          async deleteLockedModule(pattern) {
            const encodedPattern = pattern
              .split("/")
              .map((part) => encodeURIComponent(part))
              .join("/");

            await this.api(`/contracts/locked/${encodedPattern}`, {
              method: "DELETE",
            });
            await this.refreshAll();
          },

          openInterfaceEditor(item) {
            this.interfaceEditor = {
              open: true,
              id: item.id,
              status: item.status,
              owner_id: item.owner_id ? String(item.owner_id) : "",
              description: item.description || "",
            };
          },

          closeInterfaceEditor() {
            this.interfaceEditor = {
              open: false,
              id: null,
              status: "stable",
              owner_id: "",
              description: "",
            };
          },

          async saveInterfaceEdit() {
            const editor = this.interfaceEditor;
            await this.api(`/contracts/interfaces/${editor.id}`, {
              method: "PATCH",
              body: JSON.stringify({
                status: editor.status,
                owner_id: editor.owner_id ? Number(editor.owner_id) : null,
                description: editor.description || null,
              }),
            });
            this.closeInterfaceEditor();
            await this.refreshAll();
          },

          openPlannedInterfaceModal() {
            this.plannedInterfaceModal = {
              open: true,
              file_path: "",
              signature: "",
              description: "",
              owner_id: "",
            };
          },

          closePlannedInterfaceModal() {
            this.plannedInterfaceModal = {
              open: false,
              file_path: "",
              signature: "",
              description: "",
              owner_id: "",
            };
          },

          async createPlannedInterface() {
            const draft = this.plannedInterfaceModal;
            await this.api("/contracts/interfaces/planned", {
              method: "POST",
              body: JSON.stringify({
                file_path: draft.file_path,
                signature: draft.signature,
                description: draft.description || null,
                owner_id: draft.owner_id ? Number(draft.owner_id) : null,
              }),
            });
            this.closePlannedInterfaceModal();
            await this.refreshAll();
          },

          loadFeatures() {
            const raw = localStorage.getItem(featureStorageKey);
            this.features = raw ? JSON.parse(raw) : [];
            if (this.features.length > 0 && !this.selectedFeatureId) {
              this.selectFeature(this.features[0].id);
            }
          },

          saveFeatures() {
            localStorage.setItem(featureStorageKey, JSON.stringify(this.features));
          },

          openFeatureModal() {
            this.featureModal = {
              open: true,
              name: "",
              description: "",
              status: "planned",
              owner_id: "",
            };
          },

          closeFeatureModal() {
            this.featureModal = {
              open: false,
              name: "",
              description: "",
              status: "planned",
              owner_id: "",
            };
          },

          createFeature() {
            const draft = this.featureModal;
            if (!draft.name.trim()) {
              return;
            }

            const feature = {
              id: crypto.randomUUID(),
              name: draft.name.trim(),
              description: draft.description,
              status: draft.status,
              owner_id: draft.owner_id ? Number(draft.owner_id) : null,
              interface_ids: [],
              comments: [],
            };
            this.features.push(feature);
            this.saveFeatures();
            this.closeFeatureModal();
            this.selectFeature(feature.id);
          },

          selectFeature(featureId) {
            this.selectedFeatureId = featureId;
            const feature = this.selectedFeature;
            this.selectedFeatureDraft = feature
              ? {
                  name: feature.name,
                  description: feature.description,
                  status: feature.status,
                  owner_id: feature.owner_id ? String(feature.owner_id) : "",
                }
              : {};
            this.interfaceLinkDraft = "";
          },

          saveFeatureDetails() {
            const feature = this.selectedFeature;
            if (!feature) {
              return;
            }

            feature.name = this.selectedFeatureDraft.name;
            feature.description = this.selectedFeatureDraft.description;
            feature.status = this.selectedFeatureDraft.status;
            feature.owner_id = this.selectedFeatureDraft.owner_id
              ? Number(this.selectedFeatureDraft.owner_id)
              : null;
            this.saveFeatures();
          },

          featureInterfaces(feature) {
            if (!feature) {
              return [];
            }

            return this.interfaces.filter((item) => feature.interface_ids.includes(item.id));
          },

          unassignedInterfaces() {
            const assigned = new Set(
              this.features.flatMap((feature) => feature.interface_ids)
            );
            return this.interfaces.filter((item) => !assigned.has(item.id));
          },

          linkInterfaceToSelectedFeature() {
            const feature = this.selectedFeature;
            const interfaceId = Number(this.interfaceLinkDraft);
            if (!feature || !interfaceId) {
              return;
            }

            if (!feature.interface_ids.includes(interfaceId)) {
              feature.interface_ids.push(interfaceId);
              this.saveFeatures();
            }
            this.interfaceLinkDraft = "";
          },

          unlinkInterfaceFromSelectedFeature(interfaceId) {
            const feature = this.selectedFeature;
            if (!feature) {
              return;
            }

            feature.interface_ids = feature.interface_ids.filter((id) => id !== interfaceId);
            this.saveFeatures();
          },

          addCommentToSelectedFeature() {
            const feature = this.selectedFeature;
            const content = this.commentDraft.trim();
            if (!feature || !content) {
              return;
            }

            feature.comments.push({
              id: crypto.randomUUID(),
              author: this.currentMember ? this.currentMember.name : "Anonymous",
              created_at: new Date().toLocaleString(),
              content,
            });
            this.commentDraft = "";
            this.saveFeatures();
          },

          ownerName(ownerId) {
            if (!ownerId) {
              return "";
            }

            const owner = this.members.find(
              (member) => String(member.member_id) === String(ownerId)
            );
            return owner ? owner.name : "";
          },

          formatUpdatedAt(value) {
            if (!value) {
              return "Updated just now";
            }

            const date = new Date(value.replace(" ", "T"));
            if (Number.isNaN(date.getTime())) {
              return value;
            }

            return `Updated ${date.toLocaleString()}`;
          },
        };
      }
    </script>
  </body>
</html>
