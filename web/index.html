<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeRails</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      /* ================================ */
      /* CSS: Theme Variables              */
      /* ================================ */
      :root {
        --bg: #f5f6fa;
        --sidebar: #202638;
        --header: #1a1f2e;
        --panel: #ffffff;
        --panel-soft: #f8faff;
        --border: #d8e1f0;
        --text: #172033;
        --muted: #63708a;
        --primary: #4f7cff;
        --primary-dark: #3d67df;
        --danger: #e14c4c;
        --danger-bg: #ffe4e4;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        --sidebar-text: #f0f4ff;
        --hover-bg: #f7f9ff;
        --selected-bg: #f0f4ff;
        --input-bg: #ffffff;
        --chip-bg: #eef3ff;
        --badge-bg: #e7eeff;
        --btn-secondary-bg: #eaf0ff;
        --empty-bg: #f3f6fb;
      }

      [data-theme="dark"] {
        --bg: #0f172a;
        --sidebar: #1e293b;
        --header: #0f172a;
        --panel: #1e293b;
        --panel-soft: #1a2332;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #60a5fa;
        --primary-dark: #3b82f6;
        --danger: #f87171;
        --danger-bg: #3b1a1a;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        --sidebar-text: #cbd5e1;
        --hover-bg: #1e293b;
        --selected-bg: #1e3a5f;
        --input-bg: #0f172a;
        --chip-bg: #1e3a5f;
        --badge-bg: #1e3a5f;
        --btn-secondary-bg: #1e3a5f;
        --empty-bg: #1a2332;
      }

      body {
        transition: background 0.3s, color 0.3s;
      }

      /* ================================ */
      /* CSS: Reset & Base                 */
      /* ================================ */
      * {
        box-sizing: border-box;
      }

      [x-cloak] {
        display: none !important;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      /* ================================ */
      /* CSS: Layout - Header / Sidebar    */
      /* ================================ */
      .top-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 24px;
        padding: 0 20px;
        background: var(--header);
        color: white;
      }

      .logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: var(--primary);
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .viewer {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #cbd5e1;
      }

      .viewer select {
        min-width: 220px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 7px 10px;
        background: #252c3f;
        color: white;
      }

      .theme-toggle {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }

      .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .hamburger {
        display: none;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        color: white;
      }

      .hamburger:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .sidebar-overlay {
        display: none;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: 100vh;
        padding-top: 56px;
      }

      .sidebar {
        position: sticky;
        top: 56px;
        height: calc(100vh - 56px);
        background: var(--sidebar);
        color: var(--sidebar-text);
        padding: 24px 16px;
      }

      .nav-list {
        display: grid;
        gap: 10px;
      }

      .nav-button {
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        position: relative;
        padding: 8px 14px 8px 18px;
        border-radius: 8px;
        text-align: left;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .nav-button:hover {
        background: #252c3f;
      }

      .nav-button.active,
      .nav-button.active:hover {
        background: #2a3148;
      }

      .nav-button.active::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: var(--primary);
      }

      .content {
        min-width: 0;
        padding: 28px;
      }

      .page-header {
        margin-bottom: 20px;
      }

      .page-header h1 {
        margin: 0 0 8px;
        color: var(--text);
        font-size: 28px;
        font-weight: 800;
      }

      .page-header p {
        margin: 0;
        color: var(--muted);
      }

      .status-banner {
        margin-bottom: 18px;
        padding: 12px 14px;
        border-radius: 8px;
        background: #fff6db;
        color: #6c5311;
      }

      .error-banner {
        background: #ffe3e3;
        color: #8a2121;
      }

      .grid {
        display: grid;
        gap: 32px;
      }

      .overview-layout {
        display: grid;
        grid-template-columns: minmax(240px, 30%) minmax(0, 70%);
        gap: 20px;
      }

      .contracts-layout {
        display: grid;
        grid-template-columns: minmax(240px, 30%) minmax(0, 70%);
        gap: 20px;
      }

      .features-layout {
        display: grid;
        grid-template-columns: minmax(280px, 35%) minmax(0, 65%);
        gap: 32px;
      }

      .split-layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 32px;
      }

      .cards-2 {
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      /* ================================ */
      /* CSS: Components - Panels / Cards  */
      /* ================================ */
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .panel.soft {
        background: var(--panel-soft);
      }

      .panel h2,
      .panel h3,
      .panel h4 {
        margin-top: 0;
      }

      .section-title {
        display: block;
        margin: 0 0 20px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: none;
      }

      .section-title::after {
        content: none;
      }

      .card-section + .card-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .member-card {
        padding: 16px;
      }

      .member-card .grid {
        gap: 12px;
      }

      .member-card .section-title {
        margin-bottom: 8px;
      }

      .member-card .card-section + .card-section {
        margin-top: 12px;
        padding-top: 12px;
      }

      .member-list-panel,
      .member-detail-panel {
        padding: 16px;
      }

      .member-list {
        display: grid;
        gap: 8px;
      }

      .member-list-item {
        position: relative;
        display: grid;
        grid-template-columns: 36px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px 8px 16px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .member-list-item:hover {
        background: var(--hover-bg);
      }

      .member-list-item.selected {
        background: var(--selected-bg);
      }

      .member-list-item.selected::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: var(--primary);
      }

      .contract-list-item {
        position: relative;
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px 10px 18px;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
        font-weight: 700;
      }

      .contract-list-item:hover {
        background: var(--hover-bg);
      }

      .contract-list-item.selected {
        background: var(--selected-bg);
      }

      .contract-list-item.selected::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        border-radius: 999px;
        background: var(--primary);
      }

      .avatar {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: var(--btn-secondary-bg);
        color: var(--primary);
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .member-list-name {
        overflow: hidden;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .member-detail-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .member-detail-header h2 {
        margin: 0 0 6px;
        color: var(--text);
        font-size: 24px;
      }

      .team-settings {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .team-settings-body {
        display: grid;
        gap: 20px;
        margin-top: 16px;
      }

      .contracts-section {
        margin-top: 28px;
        padding-top: 28px;
        border-top: 2px solid var(--border);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .list {
        display: grid;
        gap: 12px;
      }

      .list-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        background: var(--input-bg);
        box-shadow: var(--shadow);
      }

      .list-item.selected {
        border-color: var(--primary);
        box-shadow: inset 0 0 0 1px var(--primary);
      }

      .actions,
      .inline-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--chip-bg);
        color: var(--primary-dark);
        font-size: 13px;
      }

      /* ================================ */
      /* CSS: Badges & Status              */
      /* ================================ */
      .badge,
      .status-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .badge {
        background: var(--badge-bg);
        color: var(--primary-dark);
      }

      .status-badge {
        text-transform: uppercase;
      }

      .status-stable {
        background: #dcfce7;
        color: #166534;
      }

      .status-in_progress {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .status-planned {
        background: #ffedd5;
        color: #c2410c;
      }

      .status-deprecated {
        background: #e5e7eb;
        color: #4b5563;
      }

      /* ================================ */
      /* CSS: Buttons                      */
      /* ================================ */
      .btn,
      .btn-secondary,
      .btn-danger {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .btn {
        background: var(--primary);
        color: white;
      }

      .btn:hover {
        background: var(--primary-dark);
      }

      .btn-secondary {
        background: var(--btn-secondary-bg);
        color: var(--primary-dark);
      }

      .btn-danger {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* ================================ */
      /* CSS: Forms & Inputs               */
      /* ================================ */
      .form-grid {
        display: grid;
        gap: 12px;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--input-bg);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .empty-state {
        padding: 16px;
        border-radius: 8px;
        background: var(--empty-bg);
        color: var(--muted);
      }

      .standard-preview,
      .comment-body {
        white-space: pre-wrap;
        color: var(--muted);
      }

      .interface-signature {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
      }

      .feature-card {
        cursor: pointer;
      }

      .feature-detail-header {
        display: grid;
        gap: 10px;
      }

      /* ================================ */
      /* CSS: Modals                       */
      /* ================================ */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.48);
        z-index: 30;
      }

      .modal {
        width: min(560px, 100%);
        background: var(--panel);
        border-radius: 8px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
        padding: 22px;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .modal-header h3 {
        margin: 0;
      }

      /* === Toast Notifications === */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 50;
        display: grid;
        gap: 10px;
        max-width: 380px;
        pointer-events: none;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        pointer-events: auto;
        animation: slideInUp 0.3s ease;
      }

      .toast-icon {
        flex-shrink: 0;
        font-size: 18px;
      }

      .toast-success { border-left: 4px solid #22c55e; }
      .toast-error { border-left: 4px solid var(--danger); }
      .toast-info { border-left: 4px solid var(--primary); }
      .toast-warning { border-left: 4px solid #f59e0b; }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* === End Toast === */

      /* === Skeleton Loading === */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .skeleton {
        background: linear-gradient(90deg, var(--panel) 25%, var(--border) 50%, var(--panel) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
        color: transparent !important;
        user-select: none;
        pointer-events: none;
      }

      .skeleton-line {
        height: 14px;
        margin-bottom: 10px;
        width: 100%;
      }

      .skeleton-line:last-child {
        width: 60%;
      }

      .skeleton-avatar {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        flex-shrink: 0;
      }

      .skeleton-card {
        height: 80px;
        margin-bottom: 12px;
      }

      .skeleton-panel {
        height: 200px;
      }
      /* === End Skeleton === */

      /* === Animations === */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .panel, .list-item, .modal {
        transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      }

      .panel:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      [data-theme="dark"] .panel:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      }

      .btn, .btn-secondary, .btn-danger {
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .btn:active, .btn-secondary:active, .btn-danger:active {
        transform: scale(0.97);
      }

      .empty-state {
        text-align: center;
      }
      /* === End Animations === */

      @media (max-width: 1000px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: fixed;
          top: 56px;
          left: 0;
          z-index: 25;
          width: 260px;
          height: calc(100vh - 56px);
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }

        .sidebar.sidebar-mobile-open {
          transform: translateX(0);
        }

        .sidebar-overlay {
          display: block;
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 42, 0.48);
          z-index: 24;
        }

        .hamburger {
          display: block;
        }

        .overview-layout,
        .contracts-layout,
        .features-layout,
        .split-layout {
          grid-template-columns: 1fr;
        }

        .top-header {
          align-items: center;
          height: 56px;
          padding: 10px 16px;
          gap: 12px;
        }

        .app-shell {
          padding-top: 56px;
        }
      }
    </style>
  </head>
  <body>
    <div x-data="vibeRailsApp()" x-init="init()">
      <header class="top-header">
        <div class="logo">VibeRails</div>
        <button class="hamburger" @click="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>
        <button class="theme-toggle" @click="toggleTheme()" x-html="isDark ? '&#9728;&#65039;' : '&#127769;'" :title="isDark ? 'Switch to light mode' : 'Switch to dark mode'"></button>
        <label class="viewer">
          Viewing as
          <select x-model="currentMemberId" @change="setCurrentMember()">
            <option value="">Select member</option>
            <template x-for="member in members" :key="member.member_id">
              <option :value="String(member.member_id)" x-text="`${member.name} (${member.role})`"></option>
            </template>
          </select>
        </label>
      </header>

      <div class="app-shell">
        <div class="sidebar-overlay" x-show="sidebarOpen" @click="sidebarOpen = false" x-cloak></div>
        <aside class="sidebar" :class="{'sidebar-mobile-open': sidebarOpen}">
          <nav class="nav-list">
            <button class="nav-button" :class="{ active: currentPage === 'overview' }" @click="currentPage = 'overview'; sidebarOpen = false">Overview</button>
            <button class="nav-button" :class="{ active: currentPage === 'contracts' }" @click="currentPage = 'contracts'; sidebarOpen = false">Contracts</button>
            <button class="nav-button" :class="{ active: currentPage === 'features' }" @click="currentPage = 'features'; sidebarOpen = false">Interfaces & Features</button>
            <button class="nav-button" :class="{ active: currentPage === 'issues' }" @click="currentPage = 'issues'; issueFilter.status = ''; refreshIssues(); sidebarOpen = false">Issues</button>
            <button class="nav-button" :class="{ active: currentPage === 'settings' }" @click="currentPage = 'settings'; sidebarOpen = false">AI Settings</button>
          </nav>
        </aside>

        <main class="content">
          <div class="page-header">
            <h1 x-text="pageTitles[currentPage]"></h1>
          </div>

          <div class="status-banner error-banner" x-show="error" x-text="error"></div>

          <section x-show="currentPage === 'overview'" class="overview-layout">
            <aside class="panel member-list-panel">
              <h3 class="section-title">Member List</h3>

              <template x-if="loadingMembers">
                <div class="member-list">
                  <template x-for="i in 4" :key="i">
                    <div style="display: flex; align-items: center; gap: 10px; padding: 8px 10px;">
                      <div class="skeleton skeleton-avatar"></div>
                      <div class="skeleton skeleton-line" style="flex: 1"></div>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="!loadingMembers && members.length === 0">
                <div class="empty-state">No members yet.</div>
              </template>

              <div class="member-list" x-show="!loadingMembers">
                <template x-for="member in members" :key="member.member_id">
                  <button
                    class="member-list-item"
                    :class="{ selected: selectedOverviewMemberId === member.member_id }"
                    @click="selectOverviewMember(member.member_id)"
                  >
                    <span class="avatar" x-text="memberInitial(member)"></span>
                    <span class="member-list-name" x-text="member.name"></span>
                    <span class="badge" x-text="member.role"></span>
                  </button>
                </template>
              </div>
            </aside>

            <section class="panel member-detail-panel">
              <template x-if="loadingMembers">
                <div>
                  <div class="skeleton" style="width: 180px; height: 28px; margin-bottom: 20px;"></div>
                  <div class="skeleton skeleton-card" style="width: 100%;"></div>
                  <div class="skeleton skeleton-card" style="width: 100%;"></div>

    <script>
      function vibeRailsApp() {
        const baseUrl = "http://localhost:8000";

        return {
          baseUrl,
          currentPage: "overview",
          loading: false,
          error: "",
          expandedMemberId: null,
          selectedOverviewMemberId: null,
          selectedContractSection: "global",
          teamSettingsOpen: false,
          currentMember: null,
          currentMemberId: "",
          members: [],
          interfaces: [],
          lockedModules: [],
          globalStandards: [],
          features: [],
          selectedFeatureId: null,
          selectedFeatureDraft: {},
          interfaceLinkDraft: "",
          commentDraft: "",
          newMember: { name: "", role: "" },
          newLocked: { pattern: "", reason: "" },
          patternDrafts: {},
          globalEditor: { mode: "create", category: "", content: "", originalCategory: "" },
          interfaceEditor: {
            open: false,
            id: null,
            status: "stable",
            owner_id: "",
            description: "",
          },
          plannedInterfaceModal: {
            open: false,
            file_path: "",
            signature: "",
            description: "",
            owner_id: "",
          },
          featureModal: {
            open: false,
            name: "",
            description: "",
            status: "planned",
            owner_id: "",
          },
          personalEditors: {},
          pageTitles: {
            overview: "Overview",
            contracts: "Contracts",
            features: "Interfaces & Features",
            issues: "Issues",
            settings: "AI Provider Settings",
          },
          isDark: false,
          toasts: [],
          confirmDialog: { open: false, title: "", message: "" },
          activeFeatureTab: "details",
          // AI provider state
          aiProviders: [],
          aiProviderModal: { open: false, name: "", api_base_url: "", api_key: "", model: "claude-sonnet-4-20250514", protocol: "anthropic", is_active: true },
          editingProviderId: null,
          // Chat state
          chatMessages: [],
          chatLoading: false,
          chatSending: false,
          chatDraft: "",
          lastChatMessageId: 0,
          chatPollInterval: null,
          // Issues state
          issues: [],
          issueModal: { open: false, title: "", description: "", status: "open", assignee_id: "", feature_id: "" },
          editingIssueId: null,
          issueFilter: { status: "", assignee_id: "" },
          issueComments: [],
          issueCommentDraft: "",
          _confirmResolve: null,
          sidebarOpen: true,
          loadingMembers: false,
          loadingContracts: false,
          loadingInterfaces: false,
          formErrors: {},
          _loadingFlags: {},
          _cache: {},

          isLoading(name) {
            return !!this._loadingFlags[name];
          },

          async withLoading(name, fn) {
            this._loadingFlags = { ...this._loadingFlags, [name]: true };
            try {
              return await fn();
            } finally {
              const next = { ...this._loadingFlags };
              delete next[name];
              this._loadingFlags = next;
            }
          },

          clearFormErrors() {
            this.formErrors = {};
          },

          _cacheGet(key) {
            const entry = this._cache[key];
            if (!entry) return null;
            if (Date.now() > entry.expires) {
              delete this._cache[key];
              return null;
            }
            return entry.value;
          },

          _cacheSet(key, value, ttlMs = 30000) {
            this._cache[key] = { value, expires: Date.now() + ttlMs };
          },

          _cacheInvalidate(prefix) {
            if (prefix) {
              Object.keys(this._cache)
                .filter((k) => k.startsWith(prefix))
                .forEach((k) => delete this._cache[k]);
            } else {
              this._cache = {};
            }
          },

          validateField(value, rules) {
            if (rules.required && (!value || !value.toString().trim())) {
              return rules.requiredMessage || "This field is required";
            }
            if (value && value.trim) {
              const trimmed = value.trim();
              if (rules.minLength && trimmed.length < rules.minLength) {
                return `Minimum ${rules.minLength} characters required`;
              }
              if (rules.pattern && !rules.pattern.test(trimmed)) {
                return rules.patternMessage || "Invalid format";
              }
            }
            return "";
          },

          validateForm(formName, fields) {
            const errors = {};
            let hasError = false;
            for (const [fieldName, rules] of Object.entries(fields)) {
              const error = this.validateField(rules.value, rules);
              if (error) {
                errors[fieldName] = error;
                hasError = true;
              }
            }
            this.formErrors = { ...this.formErrors, [formName]: errors };
            return !hasError;
          },

          get isCurrentUserOwner() {
            return this.currentMember?.role === "owner";
          },

          get selectedFeature() {
            return this.features.find((feature) => feature.id === this.selectedFeatureId) || null;
          },

          get selectedOverviewMember() {
            return (
              this.members.find(
                (member) => member.member_id === this.selectedOverviewMemberId
              ) || null
            );
          },

          async init() {
            this.loadTheme();
            await Promise.all([
              this.loadFeatures(),
              this.refreshAIProviders(),
              this.refreshAll(),
            ]);
          },

          loadTheme() {
            const theme = localStorage.getItem("vibrails.theme") || "light";
            this.isDark = theme === "dark";
            document.documentElement.setAttribute("data-theme", theme);
          },

          toggleTheme() {
            this.isDark = !this.isDark;
            const theme = this.isDark ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("vibrails.theme", theme);
          },

          toggleSidebar() {
            this.sidebarOpen = !this.sidebarOpen;
          },

          showToast(message, type = "success", duration = 3000) {
            const icons = { success: "&#10003;", error: "&#10007;", info: "&#9432;", warning: "&#9888;" };
            const id = crypto.randomUUID();
            this.toasts.push({ id, message, type, icon: icons[type] || icons.info });
            if (this.toasts.length > 5) {
              this.toasts.shift();
            }
            setTimeout(() => this.dismissToast(id), duration);
          },

          dismissToast(id) {
            this.toasts = this.toasts.filter((t) => t.id !== id);
          },

          async confirm(title, message) {
            return new Promise((resolve) => {
              this._confirmResolve = resolve;
              this.confirmDialog = { open: true, title, message };
            });
          },

          _handleConfirmClick() {
            const resolve = this._confirmResolve;
            this.confirmDialog.open = false;
            this._confirmResolve = null;
            if (resolve) resolve(true);
          },

          _handleConfirmCancel() {
            const resolve = this._confirmResolve;
            this.confirmDialog.open = false;
            this._confirmResolve = null;
            if (resolve) resolve(false);
          },

          async api(path, options = {}) {
            const maxRetries = options.retries ?? 0;
            const retryDelay = options.retryDelay ?? 1000;
            const method = (options.method || "GET").toUpperCase();
            const isIdempotent = ["GET", "PUT", "DELETE"].includes(method);
            const cacheKey = method === "GET" ? `GET:${path}` : null;

            // Check cache for GET requests
            if (cacheKey) {
              const cached = this._cacheGet(cacheKey);
              if (cached) return cached;
            }

            for (let attempt = 0; attempt <= maxRetries; attempt++) {
              try {
                const response = await fetch(`${this.baseUrl}${path}`, {
                  headers: { "Content-Type": "application/json", ...(options.headers || {}) },
                  ...options,
                });

                let payload = null;
                const text = await response.text();
                if (text) {
                  try {
                    payload = JSON.parse(text);
                  } catch (error) {
                    payload = text;
                  }
                }

                if (!response.ok) {
                  const detail =
                    payload && typeof payload === "object" && payload.detail
                      ? payload.detail
                      : `Request failed: ${response.status}`;
                  // Retry on 5xx for idempotent operations only
                  if (attempt < maxRetries && response.status >= 500 && isIdempotent) {
                    const delay = retryDelay * Math.pow(2, attempt);
                    await new Promise((r) => setTimeout(r, delay));
                    continue;
                  }
                  throw new Error(detail);
                }

                if (cacheKey) {
                  this._cacheSet(cacheKey, payload);
                }
                return payload;
              } catch (error) {
                if (attempt < maxRetries && isIdempotent && !(error instanceof TypeError)) {
                  // Network errors (TypeError) always retry
                  if (error.message && !error.message.startsWith("Request failed:")) {
                    const delay = retryDelay * Math.pow(2, attempt);
                    await new Promise((r) => setTimeout(r, delay));
                    continue;
                  }
                }
                throw error;
              }
            }
          },

          async refreshAll() {
            this.error = "";

            this.loadingMembers = true;
            this.loadingContracts = true;
            this.loadingInterfaces = true;

            try {
              await Promise.all([
                this.refreshMembers(),
                this.refreshLockedModules(),
                this.refreshGlobalStandards(),
                this.refreshInterfaces(),
              ]);

              this.syncEditors();
              this.ensureOverviewSelection();
              this.setCurrentMember();
            } catch (error) {
              this.error = error.message || "Failed to load data.";
            } finally {
              this.loadingMembers = false;
              this.loadingContracts = false;
              this.loadingInterfaces = false;
            }
          },

          async refreshMembers() {
            const members = await this.api("/members/");
            const enrichedMembers = await Promise.all(
              members.map(async (member) => {
                const [scope, personalStandards] = await Promise.all([
                  this.fetchScope(member.member_id),
                  this.fetchStandards(String(member.member_id)),
                ]);
                const goalStandard = personalStandards.find(
                  (standard) => standard.category === "goal"
                );
                return {
                  ...member,
                  patterns: scope.patterns,
                  personalStandards,
                  goal: goalStandard ? goalStandard.content : "",
                };
              })
            );
            this.members = enrichedMembers;
          },

          async refreshLockedModules() {
            this.lockedModules = await this.api("/contracts/locked");
          },

          async refreshGlobalStandards() {
            this.globalStandards = await this.api("/contracts/standards/global");
          },

          async refreshInterfaces() {
            this.interfaces = await this.api("/contracts/interfaces");
          },

          async refreshSingleMember(memberId) {
            try {
              const [scope, personalStandards] = await Promise.all([
                this.fetchScope(memberId),
                this.fetchStandards(String(memberId)),
              ]);
              const idx = this.members.findIndex((m) => m.member_id === memberId);
              if (idx === -1) return;
              const goalStandard = personalStandards.find(
                (s) => s.category === "goal"
              );
              this.members[idx] = {
                ...this.members[idx],
                patterns: scope.patterns,
                personalStandards,
                goal: goalStandard ? goalStandard.content : "",
              };
              // Trigger Alpine reactivity
              this.members = [...this.members];
            } catch (error) {
              this.error = error.message || "Failed to refresh member.";
            }
          },

          async fetchScope(memberId) {
            try {
              return await this.api(`/contracts/scopes/${memberId}`);
            } catch (error) {
              if (String(error.message).includes("scope not found")) {
                return { member_id: memberId, patterns: [] };
              }
              throw error;
            }
          },

          async fetchStandards(scope) {
            return this.api(`/contracts/standards/${scope}`);
          },

          setCurrentMember() {
            if (!this.currentMemberId) {
              this.currentMember = null;
              return;
            }

            this.currentMember =
              this.members.find(
                (member) => String(member.member_id) === String(this.currentMemberId)
              ) || null;
          },

          syncEditors() {
            const nextDrafts = {};
            const nextEditors = {};

            this.members.forEach((member) => {
              nextDrafts[member.member_id] = this.patternDrafts[member.member_id] || "";
              nextEditors[member.member_id] =
                this.personalEditors[member.member_id] || {
                  mode: "create",
                  category: "",
                  content: "",
                  originalCategory: "",
                };
            });

            this.patternDrafts = nextDrafts;
            this.personalEditors = nextEditors;
          },

          ensureOverviewSelection() {
            if (this.members.length === 0) {
              this.selectedOverviewMemberId = null;
              return;
            }

            const selectedStillExists = this.members.some(
              (member) => member.member_id === this.selectedOverviewMemberId
            );
            if (!selectedStillExists) {
              this.selectedOverviewMemberId = this.members[0].member_id;
            }
          },

          selectOverviewMember(memberId) {
            this.selectedOverviewMemberId = memberId;
          },

          memberInitial(member) {
            return (member?.name || "?").trim().charAt(0) || "?";
          },

          toggleMemberEditor(memberId) {
            this.expandedMemberId = this.expandedMemberId === memberId ? null : memberId;
          },

          resetGlobalEditor() {
            this.globalEditor = { mode: "create", category: "", content: "", originalCategory: "" };
          },

          startGlobalCreate() {
            this.resetGlobalEditor();
          },

          editGlobalStandard(standard) {
            this.globalEditor = {
              mode: "edit",
              category: standard.category,
              content: standard.content,
              originalCategory: standard.category,
            };
          },

          resetPersonalEditor(memberId) {
            this.personalEditors[memberId] = {
              mode: "create",
              category: "",
              content: "",
              originalCategory: "",
            };
          },

          editPersonalStandard(memberId, standard) {
            this.personalEditors[memberId] = {
              mode: "edit",
              category: standard.category,
              content: standard.content,
              originalCategory: standard.category,
            };
          },

          async createMember() {
            await this.withLoading("createMember", async () => {
              await this.api("/members/", {
                method: "POST",
                body: JSON.stringify(this.newMember),
              });
              this.newMember = { name: "", role: "" };
              await this.refreshMembers();
              this.syncEditors();
              this.ensureOverviewSelection();
              this.showToast("Member added successfully", "success");
            });
          },

          async deleteMember(memberId) {
            const member = this.members.find((m) => m.member_id === memberId);
            const name = member ? member.name : "this member";
            if (!(await this.confirm("Delete Member", `Are you sure you want to remove ${name}? This will also delete their scope and personal standards.`))) {
              return;
            }
            await this.api(`/members/${memberId}`, { method: "DELETE" });
            if (this.expandedMemberId === memberId) {
              this.expandedMemberId = null;
            }
            if (String(this.currentMemberId) === String(memberId)) {
              this.currentMemberId = "";
              this.currentMember = null;
            }
            if (this.selectedOverviewMemberId === memberId) {
              this.selectedOverviewMemberId = null;
            }
            await this.refreshMembers();
            this.showToast("Member deleted", "success");
          },

          async addPattern(memberId) {
            const draft = (this.patternDrafts[memberId] || "").trim();
            if (!draft) {
              return;
            }

            const member = this.members.find((item) => item.member_id === memberId);
            const patterns = member ? [...member.patterns] : [];
            if (!patterns.includes(draft)) {
              patterns.push(draft);
            }

            await this.api(`/contracts/scopes/${memberId}`, {
              method: "PUT",
              body: JSON.stringify({ patterns }),
            });
            this.patternDrafts[memberId] = "";
            await this.refreshSingleMember(memberId);
            this.showToast("Pattern added", "success");
          },

          async removePattern(memberId, pattern) {
            if (!(await this.confirm("Remove Pattern", `Remove the scope pattern "${pattern}"?`))) {
              return;
            }
            const member = this.members.find((item) => item.member_id === memberId);
            if (!member) {
              return;
            }

            const patterns = member.patterns.filter((item) => item !== pattern);
            if (patterns.length === 0) {
              try {
                await this.api(`/contracts/scopes/${memberId}`, { method: "DELETE" });
              } catch (error) {
                if (!String(error.message).includes("scope not found")) {
                  throw error;
                }
              }
            } else {
              await this.api(`/contracts/scopes/${memberId}`, {
                method: "PUT",
                body: JSON.stringify({ patterns }),
              });
            }

            await this.refreshSingleMember(memberId);
            this.showToast("Pattern removed", "success");
          },

          async saveGlobalStandard() {
            const editor = this.globalEditor;
            if (!editor.category.trim() || !editor.content.trim()) {
              return;
            }

            if (editor.mode === "create") {
              await this.api("/contracts/standards", {
                method: "POST",
                body: JSON.stringify({
                  scope: "global",
                  category: editor.category.trim(),
                  content: editor.content,
                }),
              });
            } else {
              await this.api(`/contracts/standards/global/${encodeURIComponent(editor.originalCategory)}`, {
                method: "PATCH",
                body: JSON.stringify({ content: editor.content }),
              });
            }

            this.resetGlobalEditor();
            await this.refreshGlobalStandards();
            this.showToast("Global standard saved", "success");
          },

          async deleteGlobalStandard(category) {
            if (!(await this.confirm("Delete Standard", `Are you sure you want to delete the "${category}" global standard?`))) {
              return;
            }
            await this.api(`/contracts/standards/global/${encodeURIComponent(category)}`, {
              method: "DELETE",
            });
            if (this.globalEditor.originalCategory === category) {
              this.resetGlobalEditor();
            }
            await this.refreshGlobalStandards();
            this.showToast("Global standard deleted", "success");
          },

          async savePersonalStandard(memberId) {
            const editor = this.personalEditors[memberId];
            if (!editor.category.trim() || !editor.content.trim()) {
              return;
            }

            if (editor.mode === "create") {
              await this.api("/contracts/standards", {
                method: "POST",
                body: JSON.stringify({
                  scope: String(memberId),
                  category: editor.category.trim(),
                  content: editor.content,
                }),
              });
            } else {
              await this.api(
                `/contracts/standards/${memberId}/${encodeURIComponent(editor.originalCategory)}`,
                {
                  method: "PATCH",
                  body: JSON.stringify({ content: editor.content }),
                }
              );
            }

            this.resetPersonalEditor(memberId);
            await this.refreshSingleMember(memberId);
            this.showToast("Personal standard saved", "success");
          },

          async deletePersonalStandard(memberId, category) {
            if (!(await this.confirm("Delete Standard", `Are you sure you want to delete the "${category}" personal standard?`))) {
              return;
            }
            await this.api(`/contracts/standards/${memberId}/${encodeURIComponent(category)}`, {
              method: "DELETE",
            });
            if (this.personalEditors[memberId]?.originalCategory === category) {
              this.resetPersonalEditor(memberId);
            }
            await this.refreshSingleMember(memberId);
            this.showToast("Personal standard deleted", "success");
          },

          async createLockedModule() {
            await this.api("/contracts/locked", {
              method: "POST",
              body: JSON.stringify(this.newLocked),
            });
            this.newLocked = { pattern: "", reason: "" };
            await this.refreshLockedModules();
            this.showToast("Locked module added", "success");
          },

          async deleteLockedModule(pattern) {
            if (!(await this.confirm("Delete Locked Module", `Are you sure you want to remove the locked module "${pattern}"?`))) {
              return;
            }
            const encodedPattern = pattern
              .split("/")
              .map((part) => encodeURIComponent(part))
              .join("/");

            await this.api(`/contracts/locked/${encodedPattern}`, {
              method: "DELETE",
            });
            await this.refreshLockedModules();
            this.showToast("Locked module removed", "success");
          },

          openInterfaceEditor(item) {
            this.interfaceEditor = {
              open: true,
              id: item.id,
              status: item.status,
              owner_id: item.owner_id ? String(item.owner_id) : "",
              description: item.description || "",
            };
          },

          closeInterfaceEditor() {
            this.interfaceEditor = {
              open: false,
              id: null,
              status: "stable",
              owner_id: "",
              description: "",
            };
          },

          async saveInterfaceEdit() {
            const editor = this.interfaceEditor;
            await this.api(`/contracts/interfaces/${editor.id}`, {
              method: "PATCH",
              body: JSON.stringify({
                status: editor.status,
                owner_id: editor.owner_id ? Number(editor.owner_id) : null,
                description: editor.description || null,
              }),
            });
            this.closeInterfaceEditor();
            await this.refreshInterfaces();
            this.showToast("Interface updated", "success");
          },

          openPlannedInterfaceModal() {
            this.plannedInterfaceModal = {
              open: true,
              file_path: "",
              signature: "",
              description: "",
              owner_id: "",
            };
          },

          closePlannedInterfaceModal() {
            this.plannedInterfaceModal = {
              open: false,
              file_path: "",
              signature: "",
              description: "",
              owner_id: "",
            };
          },

          async createPlannedInterface() {
            const draft = this.plannedInterfaceModal;
            await this.api("/contracts/interfaces/planned", {
              method: "POST",
              body: JSON.stringify({
                file_path: draft.file_path,
                signature: draft.signature,
                description: draft.description || null,
                owner_id: draft.owner_id ? Number(draft.owner_id) : null,
              }),
            });
            this.closePlannedInterfaceModal();
            await this.refreshInterfaces();
            this.showToast("Planned interface created", "success");
          },

          // ===============================
          // Features (API-backed)
          // ===============================
          async loadFeatures() {
            try {
              this.features = await this.api("/features/");
            } catch {
              this.features = [];
            }
            if (this.features.length > 0 && !this.selectedFeatureId) {
              this.selectFeature(this.features[0].id);
            }
          },

          openFeatureModal() {
            this.featureModal = {
              open: true, name: "", description: "", status: "planned", owner_id: "",
            };
          },

          closeFeatureModal() {
            this.featureModal = {
              open: false, name: "", description: "", status: "planned", owner_id: "",
            };
          },

          async createFeature() {
            const draft = this.featureModal;
            if (!draft.name.trim()) return;
            const id = crypto.randomUUID();
            await this.api("/features/", {
              method: "POST",
              body: JSON.stringify({
                id, name: draft.name.trim(), description: draft.description,
                status: draft.status, owner_id: draft.owner_id ? Number(draft.owner_id) : null,
              }),
            });
            this.closeFeatureModal();
            await this.loadFeatures();
            this.selectFeature(id);
            this.showToast("Feature created", "success");
          },

          selectFeature(featureId) {
            this.selectedFeatureId = featureId;
            const feature = this.selectedFeature;
            this.selectedFeatureDraft = feature
              ? { name: feature.name, description: feature.description, status: feature.status, owner_id: feature.owner_id ? String(feature.owner_id) : "" }
              : {};
            this.interfaceLinkDraft = "";
            this.stopChatPolling();
          },

          async saveFeatureDetails() {
            const feature = this.selectedFeature;
            if (!feature) return;
            await this.api(`/features/${encodeURIComponent(feature.id)}`, {
              method: "PATCH",
              body: JSON.stringify(this.selectedFeatureDraft),
            });
            await this.loadFeatures();
            this.showToast("Feature saved", "success");
          },

          featureInterfaces(feature) {
            if (!feature) return [];
            return this.interfaces.filter((item) => (feature.interface_ids || []).includes(item.id));
          },

          unassignedInterfaces() {
            const assigned = new Set(this.features.flatMap((f) => f.interface_ids || []));
            return this.interfaces.filter((item) => !assigned.has(item.id));
          },

          async linkInterfaceToSelectedFeature() {
            const feature = this.selectedFeature;
            const interfaceId = Number(this.interfaceLinkDraft);
            if (!feature || !interfaceId) return;
            await this.api(`/features/${encodeURIComponent(feature.id)}/interfaces`, {
              method: "POST",
              body: JSON.stringify({ interface_id: interfaceId }),
            });
            this.interfaceLinkDraft = "";
            await this.loadFeatures();
            this.showToast("Interface linked", "success");
          },

          async unlinkInterfaceFromSelectedFeature(interfaceId) {
            const feature = this.selectedFeature;
            if (!feature) return;
            await this.api(`/features/${encodeURIComponent(feature.id)}/interfaces/${interfaceId}`, {
              method: "DELETE",
            });
            await this.loadFeatures();
            this.showToast("Interface unlinked", "success");
          },

          // ===============================
          // AI Provider Methods
          // ===============================
          async refreshAIProviders() {
            try {
              this.aiProviders = await this.api("/ai/providers");
            } catch {
              this.aiProviders = [];
            }
          },

          openAIProviderModal(provider) {
            if (provider) {
              this.editingProviderId = provider.id;
              this.aiProviderModal = {
                open: true, name: provider.name, api_base_url: provider.api_base_url,
                api_key: "", model: provider.model, protocol: provider.protocol,
                is_active: provider.is_active,
              };
            } else {
              this.editingProviderId = null;
              this.aiProviderModal = {
                open: true, name: "", api_base_url: "", api_key: "",
                model: "claude-sonnet-4-20250514", protocol: "anthropic", is_active: true,
              };
            }
          },

          closeAIProviderModal() {
            this.aiProviderModal.open = false;
            this.editingProviderId = null;
          },

          async saveAIProvider() {
            const m = this.aiProviderModal;
            if (!m.name.trim() || !m.api_base_url.trim() || !m.api_key.trim()) {
              this.showToast("Please fill in all required fields", "error");
              return;
            }
            if (this.editingProviderId) {
              const body = { name: m.name, api_base_url: m.api_base_url, model: m.model, protocol: m.protocol, is_active: m.is_active };
              if (m.api_key) body.api_key = m.api_key;
              await this.api(`/ai/providers/${this.editingProviderId}`, { method: "PATCH", body: JSON.stringify(body) });
            } else {
              await this.api("/ai/providers", {
                method: "POST",
                body: JSON.stringify(m),
              });
            }
            this.closeAIProviderModal();
            await this.refreshAIProviders();
            this.showToast("AI provider saved", "success");
          },

          async deleteAIProvider(id) {
            if (!(await this.confirm("Delete Provider", "Are you sure you want to remove this AI provider?"))) return;
            await this.api(`/ai/providers/${id}`, { method: "DELETE" });
            await this.refreshAIProviders();
            this.showToast("AI provider deleted", "success");
          },

          async testAIProvider() {
            const m = this.aiProviderModal;
            if (!m.api_base_url.trim() || !m.api_key.trim()) {
              this.showToast("Fill in API URL and Key first", "error");
              return;
            }
            this.showToast("Testing connection...", "info");
            try {
              const result = await this.api("/ai/providers/test", {
                method: "POST",
                body: JSON.stringify(m),
              });
              if (result.success) {
                this.showToast("Connection successful!", "success");
              } else {
                this.showToast(result.message || "Connection failed", "error");
              }
            } catch (err) {
              this.showToast("Connection failed: " + err.message, "error");
            }
          },

          // ===============================
          // Chat Methods
          // ===============================
          async loadChatMessages(featureId) {
            if (!featureId) return;
            this.chatLoading = true;
            try {
              this.chatMessages = await this.api(`/chat/${encodeURIComponent(featureId)}`);
              this.lastChatMessageId = this.chatMessages.length > 0 ? this.chatMessages[this.chatMessages.length - 1].id : 0;
              this.startChatPolling(featureId);
            } catch {
              this.chatMessages = [];
            } finally {
              this.chatLoading = false;
            }
          },

          startChatPolling(featureId) {
            this.stopChatPolling();
            this.chatPollInterval = setInterval(async () => {
              try {
                const newMsgs = await this.api(`/chat/${encodeURIComponent(featureId)}/since/${this.lastChatMessageId}`);
                if (newMsgs.length > 0) {
                  this.chatMessages = [...this.chatMessages, ...newMsgs];
                  this.lastChatMessageId = newMsgs[newMsgs.length - 1].id;
                }
              } catch { /* ignore polling errors */ }
            }, 5000);
          },

          stopChatPolling() {
            if (this.chatPollInterval) {
              clearInterval(this.chatPollInterval);
              this.chatPollInterval = null;
            }
          },

          async sendChatMessage() {
            const feature = this.selectedFeature;
            if (!feature || !this.chatDraft.trim() || this.chatSending) return;
            this.chatSending = true;
            try {
              const result = await this.api("/chat/send", {
                method: "POST",
                body: JSON.stringify({ feature_id: feature.id, content: this.chatDraft.trim() }),
              });
              this.chatMessages = [...this.chatMessages, result.user_message, result.assistant_message];
              this.lastChatMessageId = result.assistant_message.id;
              this.chatDraft = "";
            } catch (err) {
              this.showToast(err.message || "Failed to send message", "error");
            } finally {
              this.chatSending = false;
            }
          },

          // ===============================
          // Issue Methods
          // ===============================
          expandedIssueId: null,

          async refreshIssues(featureId) {
            const params = new URLSearchParams();
            if (this.issueFilter.status) params.set("status", this.issueFilter.status);
            if (featureId) params.set("feature_id", featureId);
            try {
              this.issues = await this.api(`/issues/?${params.toString()}`);
            } catch {
              this.issues = [];
            }
          },

          openIssueModal(issue) {
            if (issue) {
              this.editingIssueId = issue.id;
              this.issueModal = {
                open: true, title: issue.title, description: issue.description || "",
                status: issue.status, assignee_id: issue.assignee_id ? String(issue.assignee_id) : "",
                feature_id: issue.feature_id || "",
              };
            } else {
              this.editingIssueId = null;
              this.issueModal = {
                open: true, title: "", description: "", status: "open", assignee_id: "",
                feature_id: this.selectedFeature ? this.selectedFeature.id : "",
              };
            }
          },

          closeIssueModal() {
            this.issueModal.open = false;
            this.editingIssueId = null;
          },

          async saveIssue() {
            const m = this.issueModal;
            if (!m.title.trim()) { this.showToast("Title is required", "error"); return; }
            const body = {
              title: m.title.trim(), description: m.description, status: m.status,
              assignee_id: m.assignee_id ? Number(m.assignee_id) : null,
              feature_id: m.feature_id || null,
            };
            if (this.editingIssueId) {
              await this.api(`/issues/${this.editingIssueId}`, { method: "PATCH", body: JSON.stringify(body) });
            } else {
              await this.api("/issues/", { method: "POST", body: JSON.stringify(body) });
            }
            this.closeIssueModal();
            await this.refreshIssues();
            this.showToast("Issue saved", "success");
          },

          async deleteIssue(id) {
            if (!(await this.confirm("Delete Issue", "Are you sure you want to delete this issue?"))) return;
            await this.api(`/issues/${id}`, { method: "DELETE" });
            await this.refreshIssues();
            this.showToast("Issue deleted", "success");
          },

          toggleIssueComments(issueId) {
            if (this.expandedIssueId === issueId) {
              this.expandedIssueId = null;
              this.issueComments = [];
            } else {
              this.expandedIssueId = issueId;
              this.loadIssueComments(issueId);
            }
          },

          async loadIssueComments(issueId) {
            try {
              this.issueComments = await this.api(`/issues/${issueId}/comments`);
            } catch {
              this.issueComments = [];
            }
          },

          async addIssueComment(issueId) {
            if (!this.issueCommentDraft.trim()) return;
            await this.api(`/issues/${issueId}/comments`, {
              method: "POST",
              body: JSON.stringify({ content: this.issueCommentDraft.trim() }),
            });
            this.issueCommentDraft = "";
            await this.loadIssueComments(issueId);
            await this.refreshIssues();
            this.showToast("Comment added", "success");
          },

          issueAssigneeName(assigneeId) {
            if (!assigneeId) return "";
            const member = this.members.find((m) => String(m.member_id) === String(assigneeId));
            return member ? member.name : "";
          },

          featureName(featureId) {
            if (!featureId) return "";
            const f = this.features.find((feat) => feat.id === featureId);
            return f ? f.name : featureId;
          },

          ownerName(ownerId) {
            if (!ownerId) {
              return "";
            }

            const owner = this.members.find(
              (member) => String(member.member_id) === String(ownerId)
            );
            return owner ? owner.name : "";
          },

          formatUpdatedAt(value) {
            if (!value) {
              return "Updated just now";
            }

            const date = new Date(value.replace(" ", "T"));
            if (Number.isNaN(date.getTime())) {
              return value;
            }

            return `Updated ${date.toLocaleString()}`;
          },
        };
      }
    </script>
  </body>
</html>
