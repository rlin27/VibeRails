<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeRails</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        background: #0f172a;
        color: #e2e8f0;
      }

      .card {
        max-width: 720px;
        margin: 0 auto;
        padding: 1.5rem;
        border-radius: 12px;
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <main class="card" x-data="{ status: 'ready' }">
      <h1>VibeRails</h1>
      <p>Single-page placeholder UI powered by Alpine.js.</p>
      <p>Frontend status: <strong x-text="status"></strong></p>
    </main>
  </body>
</html>
